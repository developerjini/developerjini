name: 📝 Update Blog Posts

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch Tistory RSS via Python
        run: |
          pip install feedparser requests
          python3 << 'EOF'
          import feedparser
          import re

          urls = [
            "https://cloudjini.tistory.com/rss",
            "https://cloudjini.tistory.com/feed",
          ]

          entries = []
          for url in urls:
            feed = feedparser.parse(url)
            if feed.entries:
              entries = feed.entries
              break

          if not entries:
            print("No entries found")
            exit(0)

          posts = ""
          for e in entries[:5]:
            title = e.title
            link = e.link
            date = e.published[:10] if hasattr(e, 'published') else ""
            posts += f"- [{title}]({link}) — {date}\n"

          with open("README.md", "r", encoding="utf-8") as f:
            content = f.read()

          new_content = re.sub(
            r"<!-- BLOG-POST-LIST:START -->.*?<!-- BLOG-POST-LIST:END -->",
            f"<!-- BLOG-POST-LIST:START -->\n{posts}<!-- BLOG-POST-LIST:END -->",
            content,
            flags=re.DOTALL
          )

          with open("README.md", "w", encoding="utf-8") as f:
            f.write(new_content)

          print("README updated successfully!")
          EOF

      - name: Commit changes
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git add README.md
          git diff --staged --quiet || git commit -m "📝 Update blog posts"
          git push
